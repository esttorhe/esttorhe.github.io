# ABOUTME: Builds the Astro site and deploys to Cloudflare Pages.
# ABOUTME: Push to astro-v2 = production deployment. PRs = preview deployment with a comment back on the PR.

name: Deploy

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  push:
    branches: [astro-v2]

concurrency:
  group: deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    # Public repo: PRs from random forks don't get secrets anyway (so wrangler
    # would fail), but they'd still burn CI minutes running the build. Gate
    # the whole job so only Esteban's own PRs + same-repo branches + pushes
    # to astro-v2 (which already require push access) trigger the workflow.
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.user.login == 'esttorhe')
    permissions:
      contents: read
      pull-requests: write
      deployments: write
    env:
      # Public PostHog key is injected at build time. Missing = the snippet is omitted entirely (no error).
      PUBLIC_POSTHOG_KEY: ${{ secrets.PUBLIC_POSTHOG_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install mise + pinned toolchain
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Astro site
        run: bun run build

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=estebantorres-es --branch=${{ github.head_ref || github.ref_name }} --commit-dirty=true

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request' && steps.deploy.outputs.deployment-url != ''
        uses: actions/github-script@v8
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.deployment-url }}
        with:
          script: |
            const marker = '<!-- cf-pages-preview -->';
            const body = `${marker}\n🚀 **Preview deployed:** ${process.env.DEPLOY_URL}`;
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
