# ABOUTME: mise tool version pins for estebantorr.es (astro-v2 branch).
# ABOUTME: Every entry is an exact version so `mise install` is fully reproducible across machines.

[tools]
# Language runtimes — bun runs Astro; node kept for npm-only tooling and CI fallbacks.
bun = "1.3.10"
node = "22.22.2"

# Agent / design tooling used by the impeccable skill (.claude/skills/impeccable).
# Browser-side npm deps it needs at runtime (puppeteer, prettier, prettier-plugin-astro)
# live in package.json devDependencies — they have to be in node_modules to be importable.
"npm:impeccable" = "2.3.2"

# Beads (issue tracker / persistent memory) — required by .claude/settings.json
# SessionStart and PreCompact hooks that call `bd prime`. Without this pin,
# hooks fail silently for any contributor without bd already on PATH.
"github:gastownhall/beads" = "1.0.4"
